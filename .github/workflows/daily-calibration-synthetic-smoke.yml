name: BIQc Daily Calibration Synthetic Smoke

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  production-calibration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BIQC_BASE_URL: https://biqc.ai
      BIQC_API_BASE_URL: https://biqc-api.azurewebsites.net
      BIQC_QA_EMAIL: ${{ secrets.BIQC_QA_EMAIL }}
      BIQC_QA_PASSWORD: ${{ secrets.BIQC_QA_PASSWORD }}
      BIQC_QA_USER_ID: ${{ secrets.BIQC_QA_USER_ID }}
      BIQC_QA_ACCOUNT_ID: ${{ secrets.BIQC_QA_ACCOUNT_ID }}
      BIQC_QA_RESET_URL: ${{ secrets.BIQC_QA_RESET_URL }}
      BIQC_QA_RESET_TOKEN: ${{ secrets.BIQC_QA_RESET_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for var in BIQC_QA_EMAIL BIQC_QA_PASSWORD BIQC_QA_USER_ID BIQC_QA_ACCOUNT_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Reset synthetic QA account (optional)
        shell: bash
        run: |
          if [ -n "$BIQC_QA_RESET_URL" ] && [ -n "$BIQC_QA_RESET_TOKEN" ]; then
            status=$(curl -sS -o /tmp/reset-response.json -w "%{http_code}" \
              -X POST "$BIQC_QA_RESET_URL" \
              -H "Authorization: Bearer $BIQC_QA_RESET_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"$BIQC_QA_USER_ID\",\"account_id\":\"$BIQC_QA_ACCOUNT_ID\"}")
            if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
              echo "::error::Synthetic reset failed with status $status"
              cat /tmp/reset-response.json
              exit 1
            fi
          else
            echo "Synthetic reset URL/token not configured; continuing without reset."
          fi

      - name: Run production calibration smoke
        working-directory: frontend
        run: npm run e2e:prod

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-smoke-artifacts
          path: |
            frontend/test-results/**
            frontend/playwright-report/**
          if-no-files-found: warn

      - name: Create GitHub issue on failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let failingStep = 'unknown';
            let failureReason = 'See workflow logs and artifacts';
            let route = 'unknown';
            try {
              const raw = fs.readFileSync('frontend/test-results/calibration-smoke-result.json', 'utf8');
              const parsed = JSON.parse(raw);
              const firstFail = (parsed.steps || []).find((s) => s.status === 'fail');
              if (firstFail?.name) failingStep = firstFail.name;
              if (parsed.failure_reason) failureReason = parsed.failure_reason;
              if (parsed.route) route = parsed.route;
            } catch (e) {}
            const title = `Synthetic calibration smoke failed: ${new Date().toISOString()}`;
            const body = [
              'Daily production synthetic smoke failed.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Commit: ${context.sha}`,
              `- Environment: production`,
              `- Base URL: https://biqc.ai`,
              `- Failing step: ${failingStep}`,
              `- Route: ${route}`,
              `- Error: ${failureReason}`,
              '',
              'Review uploaded artifacts for screenshots/trace/json result.',
            ].join('\n');
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['synthetic-monitor', 'production', 'bug'],
              });
            } catch (err) {
              core.warning(`Issue creation skipped: ${err.message}`);
            }
