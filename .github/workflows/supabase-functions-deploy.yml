name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase-functions-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Deploy all edge functions"
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DEPLOY_ALL: ${{ github.event.inputs.deploy_all || 'false' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing required secrets: SUPABASE_ACCESS_TOKEN and/or SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ "$DEPLOY_ALL" = "true" ]; then
            echo "Manual full deploy requested."
            for dir in supabase/functions/*; do
              if [ -d "$dir" ] && [ -f "$dir/index.ts" ]; then
                fn=$(basename "$dir")
                echo "Deploying $fn"
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir .
              fi
            done
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_FUNCTIONS=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" \
            | sed -n 's#^supabase/functions/\([^/]*\)/.*#\1#p' \
            | sort -u)

          if [ -z "$CHANGED_FUNCTIONS" ]; then
            echo "No Supabase edge function changes detected."
            exit 0
          fi

          echo "Changed functions:"
          echo "$CHANGED_FUNCTIONS"

          for fn in $CHANGED_FUNCTIONS; do
            if [ -f "supabase/functions/$fn/index.ts" ]; then
              echo "Deploying $fn"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir .
            else
              echo "Skipping $fn (no index.ts found)"
            fi
          done
