name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase-functions-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Deploy all edge functions"
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required GitHub secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MISSING=()
          for key in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_SERVICE_ROLE_KEY; do
            val="${!key}"
            if [ -z "$val" ]; then
              MISSING+=("$key")
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets: ${MISSING[*]}"
            exit 1
          fi

      - name: Deploy changed edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEPLOY_ALL: ${{ github.event.inputs.deploy_all || 'false' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing required secrets: SUPABASE_ACCESS_TOKEN and/or SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ "$DEPLOY_ALL" = "true" ]; then
            echo "Manual full deploy requested."
            for dir in supabase/functions/*; do
              if [ -d "$dir" ] && [ -f "$dir/index.ts" ]; then
                fn=$(basename "$dir")
                echo "Deploying $fn"
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir .
              fi
            done
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_FUNCTIONS=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" \
            | sed -n 's#^supabase/functions/\([^/]*\)/.*#\1#p' \
            | sort -u)

          if [ -z "$CHANGED_FUNCTIONS" ]; then
            echo "No Supabase edge function changes detected."
            exit 0
          fi

          echo "Changed functions:"
          echo "$CHANGED_FUNCTIONS"

          for fn in $CHANGED_FUNCTIONS; do
            if [ -f "supabase/functions/$fn/index.ts" ]; then
              echo "Deploying $fn"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir .
            else
              echo "Skipping $fn (no index.ts found)"
            fi
          done

      - name: Verify calibration edge runtime secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          RAW_SECRETS="$(supabase secrets list --project-ref "$SUPABASE_PROJECT_REF" 2>&1)"
          if [ -z "$RAW_SECRETS" ]; then
            echo "Supabase secrets list returned empty output."
            exit 1
          fi
          export RAW_SECRETS

          python3 - <<'PY'
          import os
          import re
          import sys

          raw = os.environ.get("RAW_SECRETS", "")
          detected = set(re.findall(r"\b[A-Z][A-Z0-9_]{2,}\b", raw))
          required = [
              "SUPABASE_URL",
              "SUPABASE_SERVICE_ROLE_KEY",
              "OPENAI_API_KEY",
              "FIRECRAWL_API_KEY",
              "PERPLEXITY_API_KEY",
              "BROWSE_AI_API_KEY",
              "SEMRUSH_API_KEY",
          ]
          missing = [name for name in required if name not in detected]
          if missing:
              print("Missing calibration runtime secrets in Supabase Edge runtime:", ", ".join(missing))
              sys.exit(1)
          print("Calibration runtime secrets verified:", ", ".join(required))
          PY

      - name: Calibration edge health smoke
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          EDGE_BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1"
          FUNCTIONS=(
            calibration-business-dna
            scrape-business-profile
            deep-web-recon
            social-enrichment
            browse-ai-reviews
            semrush-domain-intel
            market-analysis-ai
            market-signal-scorer
            calibration-psych
            calibration-sync
            calibration-engine
            competitor-monitor
          )

          for fn in "${FUNCTIONS[@]}"; do
            body_file="/tmp/${fn}-health.json"
            http_code=$(curl --silent --show-error --output "$body_file" --write-out "%{http_code}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              "${EDGE_BASE}/${fn}")

            if [ "$http_code" != "200" ]; then
              echo "Health check failed for ${fn}: HTTP ${http_code}"
              cat "$body_file"
              exit 1
            fi

            python3 - "$fn" "$body_file" <<'PY'
          import json
          import sys
          from pathlib import Path

          fn = sys.argv[1]
          path = Path(sys.argv[2])
          raw = path.read_text(encoding="utf-8").strip()
          try:
              payload = json.loads(raw or "{}")
          except Exception:
              print(f"{fn}: invalid JSON health payload")
              print(raw[:500])
              raise SystemExit(1)

          required = ("ok", "function", "reachable", "generated_at")
          missing = [key for key in required if key not in payload]
          if missing:
              print(f"{fn}: missing health keys: {missing}")
              raise SystemExit(1)
          if payload.get("ok") is not True:
              print(f"{fn}: health payload ok flag is not true")
              raise SystemExit(1)
          if payload.get("reachable") is not True:
              print(f"{fn}: health payload reachable flag is not true")
              raise SystemExit(1)
          reported_name = str(payload.get("function") or "")
          if reported_name not in {fn, fn.replace("-", "_")}:
              print(f"{fn}: health payload function mismatch: {reported_name}")
              raise SystemExit(1)
          PY
          done
