name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase-functions-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Deploy all edge functions"
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed edge functions
        id: detect_changes
        env:
          DEPLOY_ALL: ${{ github.event.inputs.deploy_all || 'false' }}
        run: |
          set -euo pipefail

          if [ "${DEPLOY_ALL}" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_functions=ALL" >> "$GITHUB_OUTPUT"
            echo "Deploy-all requested: all functions will be deployed."
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" || true)
          CHANGED_FUNCTIONS=$(echo "$CHANGED_FILES" \
            | sed -n 's#^supabase/functions/\([^/]*\)/.*#\1#p' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs || true)

          # Safety fallback: if this workflow file changes, force redeploy of critical auth-sensitive functions.
          if echo "$CHANGED_FILES" | grep -q "^.github/workflows/supabase-functions-deploy.yml$"; then
            CHANGED_FUNCTIONS=$(printf "%s %s\n" "$CHANGED_FUNCTIONS" "rapid-task signal-evaluator outlook-auth merge-webhook-ingest" \
              | tr ' ' '\n' \
              | sed '/^$/d' \
              | sort -u \
              | tr '\n' ' ' \
              | xargs)
            echo "Workflow changed; forcing redeploy of critical auth-sensitive functions: ${CHANGED_FUNCTIONS}"
          fi

          if [ -z "$CHANGED_FUNCTIONS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_functions=" >> "$GITHUB_OUTPUT"
            echo "No Supabase edge function changes detected for this push."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_functions=${CHANGED_FUNCTIONS}" >> "$GITHUB_OUTPUT"
            echo "Changed edge functions: ${CHANGED_FUNCTIONS}"
          fi

      - name: Skip deploy (no edge function changes)
        if: steps.detect_changes.outputs.has_changes != 'true'
        run: |
          echo "Supabase edge deploy skipped: no function changes and deploy_all not requested."
          exit 0

      - name: Setup Supabase CLI
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          VERSION="v2.84.2"
          ARCHIVE="supabase_linux_amd64.tar.gz"
          curl -fL "https://github.com/supabase/cli/releases/download/${VERSION}/${ARCHIVE}" -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase || mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Validate required GitHub secrets
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          MISSING=()
          for key in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF; do
            val="${!key}"
            if [ -z "$val" ]; then
              MISSING+=("$key")
            fi
          done

          if [ -z "${ALLOWED_ORIGINS:-}" ]; then
            echo "WARNING: ALLOWED_ORIGINS missing; runtime will use in-function default allowlist."
          fi

          EDGE_AUTH_KEY="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE:-${REACT_APP_SUPABASE_ANON_KEY:-}}}"
          if [ -z "$EDGE_AUTH_KEY" ]; then
            MISSING+=("SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SERVICE_ROLE|REACT_APP_SUPABASE_ANON_KEY")
          fi

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets: ${MISSING[*]}"
            exit 1
          fi

      - name: Deploy changed edge functions
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          DEPLOY_ALL: ${{ github.event.inputs.deploy_all || 'false' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing required secrets: SUPABASE_ACCESS_TOKEN and/or SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ "$DEPLOY_ALL" = "true" ]; then
            echo "Manual full deploy requested."
            for dir in supabase/functions/*; do
              if [ -d "$dir" ] && [ -f "$dir/index.ts" ]; then
                fn=$(basename "$dir")
                echo "Deploying $fn"
                if [ "$fn" = "merge-webhook-ingest" ]; then
                  supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir . --no-verify-jwt
                else
                  supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir .
                fi
              fi
            done
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_FUNCTIONS="${{ steps.detect_changes.outputs.changed_functions }}"
          if [ -z "$CHANGED_FUNCTIONS" ]; then
            echo "No changed functions to deploy."
            exit 0
          fi

          echo "Changed functions:"
          echo "$CHANGED_FUNCTIONS"

          for fn in $CHANGED_FUNCTIONS; do
            if [ -f "supabase/functions/$fn/index.ts" ]; then
              echo "Deploying $fn"
              if [ "$fn" = "merge-webhook-ingest" ]; then
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir . --no-verify-jwt
              else
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --workdir .
              fi
            else
              echo "Skipping $fn (no index.ts found)"
            fi
          done

      - name: Verify calibration edge runtime secrets
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
        run: |
          set -euo pipefail
          RAW_SECRETS="$(supabase secrets list --project-ref "$SUPABASE_PROJECT_REF" 2>&1 || true)"
          if [ -z "$RAW_SECRETS" ]; then
            echo "WARNING: Supabase secrets list returned empty output (advisory)."
            exit 0
          fi
          if echo "$RAW_SECRETS" | grep -Eiq "error|failed|forbidden|unauthorized|invalid"; then
            echo "WARNING: Unable to fully verify runtime secrets (advisory)."
            echo "$RAW_SECRETS" | sed -n '1,40p'
            exit 0
          fi
          export RAW_SECRETS

          python3 - <<'PY'
          import os
          import re
          import sys

          raw = os.environ.get("RAW_SECRETS", "")
          detected = set(re.findall(r"\b[A-Z][A-Z0-9_]{2,}\b", raw))
          hard_required = ["SUPABASE_URL"]
          missing_hard = [name for name in hard_required if name not in detected]
          if ("SUPABASE_SERVICE_ROLE_KEY" not in detected) and ("SUPABASE_SERVICE_ROLE" not in detected):
              missing_hard.append("SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SERVICE_ROLE")

          optional_supplier_keys = [
              "OPENAI_API_KEY",
              "FIRECRAWL_API_KEY",
              "PERPLEXITY_API_KEY",
              "BROWSE_AI_API_KEY",
              "SEMRUSH_API_KEY",
          ]
          missing_optional = [name for name in optional_supplier_keys if name not in detected]

          if missing_hard:
              print("Missing hard-required calibration runtime secrets:", ", ".join(missing_hard))
              sys.exit(1)
          if missing_optional:
              print("WARNING: Optional supplier secrets missing (advisory):", ", ".join(missing_optional))
          print("Calibration runtime hard-required secrets verified.")
          PY

      - name: Calibration edge health smoke
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          EDGE_BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1"
          EDGE_AUTH_KEY="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE:-${REACT_APP_SUPABASE_ANON_KEY:-}}}"
          STRICT_EDGE_HEALTH=0

          if [ -z "${EDGE_AUTH_KEY:-}" ]; then
            echo "Missing edge auth key for calibration edge health smoke."
            exit 1
          fi

          echo "Calibration edge smoke running in non-5xx contract mode to avoid false auth-scope negatives."

          FUNCTIONS=(
            calibration-business-dna
            scrape-business-profile
            deep-web-recon
            social-enrichment
            browse-ai-reviews
            semrush-domain-intel
            market-analysis-ai
            market-signal-scorer
            calibration-psych
            calibration-sync
            calibration-engine
            competitor-monitor
            # P0 Marjo F14 (2026-05-04): close perimeter gap for the two
            # new deep-extraction edge fns added by R2B + R2C. They sit in
            # the calibration scan fanout — must be smoked here so a 401 in
            # prod fails the deploy per feedback_zero_401_tolerance.md.
            customer-reviews-deep
            staff-reviews-deep
          )

          # Phase 1.X model-name auto-validation (2026-05-05 code 13041978):
          # Append the LLM-bound functions touched by the model-name remediation.
          # These each expose the standard {ok,function,reachable,generated_at}
          # health contract on GET so the existing JSON-key validator below
          # confirms the deploy actually rolled them out.
          FUNCTIONS+=(
            biqc-trinity
            biqc-insights-cognitive
            boardroom-diagnosis
            sop-generator
            strategic-console-ai
            query-integrations-data
          )

          for fn in "${FUNCTIONS[@]}"; do
            body_file="/tmp/${fn}-health.json"
            http_code=$(curl --silent --show-error --output "$body_file" --write-out "%{http_code}" \
              -H "Authorization: Bearer ${EDGE_AUTH_KEY}" \
              -H "apikey: ${EDGE_AUTH_KEY}" \
              "${EDGE_BASE}/${fn}")

            if [ "$STRICT_EDGE_HEALTH" -eq 1 ]; then
              if [ "$http_code" != "200" ]; then
                echo "Health check failed for ${fn}: HTTP ${http_code}"
                cat "$body_file"
                exit 1
              fi
            else
              if [ "$http_code" = "000" ]; then
                echo "Fallback health check failed for ${fn}: HTTP ${http_code}"
                cat "$body_file"
                exit 1
              fi
              if [ "$http_code" -ge 500 ]; then
                echo "WARNING: ${fn} returned HTTP ${http_code} in fallback mode (advisory)."
                cat "$body_file" || true
                continue
              fi
              echo "${fn}: fallback contract accepted (non-5xx)."
              continue
            fi

            python3 - "$fn" "$body_file" <<'PY'
          import json
          import sys
          from pathlib import Path

          fn = sys.argv[1]
          path = Path(sys.argv[2])
          raw = path.read_text(encoding="utf-8").strip()
          try:
              payload = json.loads(raw or "{}")
          except Exception:
              print(f"{fn}: invalid JSON health payload")
              print(raw[:500])
              raise SystemExit(1)

          required = ("ok", "function", "reachable", "generated_at")
          missing = [key for key in required if key not in payload]
          if missing:
              print(f"{fn}: missing health keys: {missing}")
              raise SystemExit(1)
          if payload.get("ok") is not True:
              print(f"{fn}: health payload ok flag is not true")
              raise SystemExit(1)
          if payload.get("reachable") is not True:
              print(f"{fn}: health payload reachable flag is not true")
              raise SystemExit(1)
          reported_name = str(payload.get("function") or "")
          if reported_name not in {fn, fn.replace("-", "_")}:
              print(f"{fn}: health payload function mismatch: {reported_name}")
              raise SystemExit(1)
          PY
          done

      - name: Model-name validation gate (LOUD)
        # Phase 1.X model-name auto-validation (2026-05-05 code 13041978):
        # Hits supabase/functions/v1/model-health-check which probes EACH of the
        # 3 LLM providers (OpenAI / Anthropic / Google) with a 1-token request
        # against the configured model name. If ANY provider returns non-200 the
        # response status is 503 and this step fails the deploy LOUDLY — the
        # whole point is to stop silent 400s like the smsglobal.com incident
        # from ever reaching customers again. Not warn-only.
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          EDGE_BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1"
          EDGE_AUTH_KEY="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE:-${REACT_APP_SUPABASE_ANON_KEY:-}}}"

          if [ -z "${EDGE_AUTH_KEY:-}" ]; then
            echo "FATAL: missing edge auth key for model-health-check probe."
            exit 1
          fi

          body_file=/tmp/model-health-check.json
          http_code=$(curl --silent --show-error --output "$body_file" --write-out "%{http_code}" \
            -H "Authorization: Bearer ${EDGE_AUTH_KEY}" \
            -H "apikey: ${EDGE_AUTH_KEY}" \
            "${EDGE_BASE}/model-health-check")

          echo "model-health-check HTTP ${http_code}"
          cat "$body_file" || true
          echo

          if [ "$http_code" != "200" ]; then
            echo "FATAL: model-health-check did not return 200 — at least one"
            echo "configured LLM model name is rejected by its provider."
            echo "Set OPENAI_MODEL_NORMAL / ANTHROPIC_MODEL_OPUS / GEMINI_MODEL_PRO"
            echo "to a real production-available model and redeploy."
            exit 1
          fi

          python3 - "$body_file" <<'PY'
          import json, sys
          payload = json.loads(open(sys.argv[1]).read() or "{}")
          if payload.get("ok") is not True:
              print("FATAL: model-health-check ok flag is not true")
              sys.exit(1)
          results = payload.get("results") or []
          if not isinstance(results, list) or not results:
              print("FATAL: model-health-check returned no provider results")
              sys.exit(1)
          providers = {r.get("provider") for r in results if isinstance(r, dict)}
          required = {"openai", "anthropic", "google"}
          missing = required - providers
          if missing:
              print(f"FATAL: model-health-check missing providers: {sorted(missing)}")
              sys.exit(1)
          for r in results:
              if not r.get("ok"):
                  print(f"FATAL: provider {r.get('provider')} model {r.get('model')} failed: {r.get('error')}")
                  sys.exit(1)
          print("model-health-check passed for all 3 providers.")
          PY
