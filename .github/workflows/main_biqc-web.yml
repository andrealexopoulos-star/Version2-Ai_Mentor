name: Build and deploy container app to Azure Web App - biqc-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: biqcregistry.azurecr.io
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4CB986AB71414AD8BAE99B213E28D54D }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_44FDAFCBE67146C68680C04F67A9FB3C }}

      - name: Build and push frontend container image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: biqcregistry.azurecr.io/biqc-frontend:${{ github.sha }}
          build-args: |
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}
            REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}
            REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
            REACT_APP_RECAPTCHA_SITE_KEY=${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CF8054DFE14F497888721800B474B43E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EAC1E34A76C54D1295EBA14AA4311D10 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E974023533224B319AD1D619A403A917 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'biqc-web'
          images: 'biqcregistry.azurecr.io/biqc-frontend:${{ github.sha }}'
