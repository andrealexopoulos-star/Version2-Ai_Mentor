name: Manual Website Release (Protected)

on:
  workflow_dispatch:
    inputs:
      approval_phrase:
        description: "Type APPROVE_WEBSITE_RELEASE to continue"
        required: true
        type: string
      release_note:
        description: "Reason for website release"
        required: true
        type: string

env:
  REGISTRY: biqcregistry.azurecr.io
  FRONTEND_IMAGE: biqcregistry.azurecr.io/biqc-frontend
  IMAGE_TAG: website-${{ github.sha }}
  AZURE_WEBAPP_FRONTEND: biqc-web
  AZURE_RESOURCE_GROUP: biqc-production

jobs:
  validate-approval:
    name: Validate Manual Approval
    runs-on: ubuntu-latest
    steps:
      - name: Check approval phrase
        run: |
          if [ "${{ github.event.inputs.approval_phrase }}" != "APPROVE_WEBSITE_RELEASE" ]; then
            echo "Invalid approval phrase. Release blocked."
            exit 1
          fi
          echo "Manual website release approved."

  build-and-deploy-website:
    name: Build and Deploy Website
    runs-on: ubuntu-latest
    needs: [validate-approval]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log release note
        run: |
          echo "Website release note: ${{ github.event.inputs.release_note }}"

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:website-latest
          build-args: |
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}
            REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}
            REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
            REACT_APP_RECAPTCHA_SITE_KEY=${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
            REACT_APP_RECAPTCHA_MODE=${{ secrets.REACT_APP_RECAPTCHA_MODE }}
            REACT_APP_RECAPTCHA_PROVIDER=${{ secrets.REACT_APP_RECAPTCHA_PROVIDER }}
            REACT_APP_RECAPTCHA_STRICT=${{ secrets.REACT_APP_RECAPTCHA_STRICT }}
            REACT_APP_RECAPTCHA_FORCE_VISIBLE=true
            GENERATE_SOURCEMAP=false

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend to Azure App Service
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

          az webapp restart \
            --name ${{ env.AZURE_WEBAPP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Verify homepage baseline markers
        run: |
          for i in $(seq 1 12); do
            curl --silent --show-error https://biqc.ai > /tmp/website_home.html || true
            if grep -q "How BIQc Works" /tmp/website_home.html && grep -q "Try It Free" /tmp/website_home.html; then
              echo "Website release verification passed."
              exit 0
            fi
            sleep 5
          done
          echo "Website release verification failed."
          exit 1
