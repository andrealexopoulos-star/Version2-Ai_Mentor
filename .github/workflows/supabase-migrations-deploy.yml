name: Deploy Supabase DB Migrations

# Closes infrastructure gap surfaced 2026-04-22 during Sprint A:
# the main Build & Deploy BIQc workflow deploys Azure frontend + backend
# + Supabase edge functions, but does NOT run `supabase db push`. As a
# result, every migration in supabase/migrations/ has to be manually
# applied via MCP or locally. This workflow auto-applies on merge to main.
#
# Safety properties:
#   - Only triggers on push to main AND only when supabase/migrations/**
#     changed, so unrelated pushes don't try to re-apply migrations.
#   - workflow_dispatch with a dry_run input for ad-hoc preview.
#   - fail-fast: true — stops on first DDL error.
#   - NEVER runs on PRs (migrations should only hit prod after review merged).
#
# Required GitHub secrets (set in: Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   (already configured per supabase-functions-deploy.yml)
#   SUPABASE_PROJECT_REF    (already configured — defaults to vwwandhoydemcybltoxz)
#   SUPABASE_DB_PASSWORD    (NEW — required for `supabase db push`; get it from
#                            Supabase Dashboard → Project Settings → Database →
#                            Database password. Copy + paste into GH secrets.)
#
# If SUPABASE_DB_PASSWORD is not set, the workflow fails at the link step
# with a clear error rather than silently skipping migrations.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations-deploy.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (show what would apply, do not apply)"
        required: false
        default: "false"

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          MISSING=()
          [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "${SUPABASE_PROJECT_REF:-}" ] && MISSING+=("SUPABASE_PROJECT_REF")
          [ -z "${SUPABASE_DB_PASSWORD:-}" ] && MISSING+=("SUPABASE_DB_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "Set them in: GitHub → Settings → Secrets and variables → Actions."
            echo "SUPABASE_DB_PASSWORD is obtained from: Supabase Dashboard → Project Settings → Database → Database password."
            exit 1
          fi
          echo "All required secrets present."

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_PROJECT_REF || 'vwwandhoydemcybltoxz' }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          echo "Project linked: $SUPABASE_PROJECT_REF"

      - name: List changed migration files
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-list --max-parents=0 HEAD)"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'supabase/migrations/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No migration files changed in this push."
          else
            echo "Changed migration files:"
            echo "$CHANGED"
          fi

      - name: Dry-run migration diff
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::group::Pending migrations"
          supabase migration list --linked || true
          echo "::endgroup::"

      - name: Apply migrations (skipped if dry_run=true)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase db push --linked --include-all

      - name: Verify applied state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::group::Post-apply migration list"
          supabase migration list --linked
          echo "::endgroup::"

      - name: Dry-run complete
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry-run completed — no migrations applied. Re-run without dry_run to apply."
