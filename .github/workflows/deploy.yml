name: Build & Deploy BIQc

on:
  push:
    branches: [main]

env:
  REGISTRY: biqcregistry.azurecr.io
  FRONTEND_IMAGE: biqcregistry.azurecr.io/biqc-frontend
  BACKEND_IMAGE: biqcregistry.azurecr.io/biqc-backend
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_BASE_URL: https://biqc-api.azurewebsites.net
  FRONTEND_APP_URL: https://biqc-web.azurewebsites.net
  PRODUCTION_URL: https://biqc.ai
  AZURE_WEBAPP_FRONTEND: biqc-web
  AZURE_WEBAPP_BACKEND: biqc-api
  AZURE_RESOURCE_GROUP: biqc-production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_HEALTH_URL: https://biqc-api.azurewebsites.net/api/health
  BACKEND_AUTH_PROBE_URL: https://biqc-api.azurewebsites.net/api/user/integration-status

jobs:
  website-change-gate:
    name: Website Change Gate
    runs-on: ubuntu-latest
    outputs:
      website_changed: ${{ steps.scan.outputs.website_changed }}
      website_approved: ${{ steps.scan.outputs.website_approved }}
      deploy_frontend: ${{ steps.scan.outputs.deploy_frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect protected website changes
        id: scan
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-count=1 HEAD^ || true)"
          fi

          if [ -z "$BEFORE_SHA" ]; then
            git ls-files > /tmp/changed_files.txt
          else
            git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" > /tmp/changed_files.txt
          fi

          WEBSITE_PATTERN='^(frontend/src/pages/website/|frontend/src/components/website/|frontend/src/pages/LoginSupabase\.js$|frontend/src/pages/RegisterSupabase\.js$|frontend/src/App\.js$)'
          WEBSITE_CHANGED=false
          if grep -E "$WEBSITE_PATTERN" /tmp/changed_files.txt >/tmp/website_changes.txt; then
            WEBSITE_CHANGED=true
          fi

          WEBSITE_APPROVED=false
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MESSAGE" | grep -qi "\[website-approved\]"; then
            WEBSITE_APPROVED=true
          fi

          DEPLOY_FRONTEND=true
          if [ "$WEBSITE_CHANGED" = "true" ] && [ "$WEBSITE_APPROVED" != "true" ]; then
            DEPLOY_FRONTEND=false
          fi

          echo "website_changed=$WEBSITE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "website_approved=$WEBSITE_APPROVED" >> "$GITHUB_OUTPUT"
          echo "deploy_frontend=$DEPLOY_FRONTEND" >> "$GITHUB_OUTPUT"

          echo "Website changed: $WEBSITE_CHANGED"
          echo "Website approved: $WEBSITE_APPROVED"
          echo "Deploy frontend: $DEPLOY_FRONTEND"
          if [ "$WEBSITE_CHANGED" = "true" ]; then
            echo "Protected website files changed:"
            cat /tmp/website_changes.txt
          fi

      - name: Enforce approval for protected website changes (blocking)
        run: |
          if [ "${{ steps.scan.outputs.website_changed }}" = "true" ] && [ "${{ steps.scan.outputs.website_approved }}" != "true" ]; then
            echo "Blocked: protected website files changed without [website-approved] in commit message."
            echo "Add [website-approved] after explicit website QA sign-off, then re-run deployment."
            exit 1
          fi
          echo "Website deployment gate passed."

  # ─── TEST ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run deploy gate smoke tests
        timeout-minutes: 3
        run: python -m pytest backend/tests/test_deploy_gate_smoke.py --tb=short -q --no-header --timeout=20 -x
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL != '' && secrets.REACT_APP_BACKEND_URL || env.BACKEND_BASE_URL }}
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET_KEY: test-secret-key

  # ─── NON-BLOCKING ITERATION REGRESSION ────────────────────────────────────
  regression-iterations:
    name: Iteration Regression (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run full iteration suite (non-blocking)
        timeout-minutes: 20
        run: python -m pytest backend/tests/ --tb=short -q --no-header --timeout=10 -x --ignore=backend/tests/test_iteration24_intelligence_pipeline.py --ignore=backend/tests/test_iteration58_admin_portal.py
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL != '' && secrets.REACT_APP_BACKEND_URL || env.BACKEND_BASE_URL }}
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE }}
          SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET_KEY: test-secret-key

  # ─── PRE-PROD FORENSIC GATE (BLOCKING) ───────────────────────────────────
  preprod-forensic-gate:
    name: Pre-Prod Forensic Gate
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Gate version marker
        run: |
          echo "FORENSIC_GATE_VERSION=v6"
          echo "GITHUB_SHA=${GITHUB_SHA}"

      - name: Validate required release secrets are present
        run: |
          missing=0
          for name in \
            REACT_APP_SUPABASE_URL \
            REACT_APP_SUPABASE_ANON_KEY \
            OPENAI_API_KEY \
            AZURE_CREDENTIALS \
            ACR_USERNAME \
            ACR_PASSWORD \
            SUPABASE_ACCESS_TOKEN
          do
            val="$(printenv "$name" || true)"
            if [ -z "$val" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && [ -z "${SUPABASE_SERVICE_ROLE:-}" ]; then
            echo "Service-role secret missing; forensic probe will use anon key fallback."
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Pre-prod forensic gate failed: missing required secrets."
            exit 1
          fi
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Probe critical edge functions for non-5xx contracts
        run: |
          set -euo pipefail
          BASE="${{ secrets.REACT_APP_SUPABASE_URL }}/functions/v1"
          SRK="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE:-${REACT_APP_SUPABASE_ANON_KEY:-}}}"
          if [ -z "$SRK" ]; then
            echo "Missing credentials for edge probes (service-role and anon key absent)."
            exit 1
          fi
          AUTH="Authorization: Bearer ${SRK}"
          APIKEY="apikey: ${SRK}"

          check_status() {
            local name="$1"
            local method="$2"
            local payload="${3:-}"
            local allowed="$4"
            local code
            local out

            out="/tmp/edge_${name}.json"
            if [ "$method" = "GET" ]; then
              code="$(curl --silent --show-error --output "$out" --write-out "%{http_code}" \
                -H "$AUTH" -H "$APIKEY" "${BASE}/${name}")"
            else
              code="$(curl --silent --show-error --output "$out" --write-out "%{http_code}" \
                -X POST -H "$AUTH" -H "$APIKEY" -H "Content-Type: application/json" \
                -d "$payload" "${BASE}/${name}")"
            fi

            echo "${name} ${method} -> HTTP ${code}"
            echo "Allowed: ${allowed}"
            if ! echo " ${allowed} " | grep -q " ${code} "; then
              echo "Unexpected status from ${name}: ${code}"
              cat "$out" || true
              exit 1
            fi
          }

          # Health endpoint must be live.
          check_status "calibration-engine" "GET" "" "200"
          # Contract checks: function reachable, auth/validation failures allowed,
          # but any 5xx remains blocking.
          check_status "calibration-psych" "POST" "{}" "200 400 401 403 422"
          check_status "calibration-sync" "POST" "{}" "400 401 403 422"
          check_status "calibration-business-dna" "POST" "{}" "400 401 403 422"
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}

  # ─── RELEASE EVIDENCE REFRESH (TEMPORARY ADVISORY) ───────────────────────
  release-evidence-refresh:
    name: Release Evidence Refresh
    runs-on: ubuntu-latest
    needs: [preprod-forensic-gate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Supabase CLI
        run: |
          set -euo pipefail
          VERSION="v2.84.2"
          ARCHIVE="supabase_linux_amd64.tar.gz"
          curl -L "https://github.com/supabase/cli/releases/download/${VERSION}/${ARCHIVE}" -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Refresh release evidence chain (advisory)
        run: |
          set +e
          python3 scripts/run_release_evidence_refresh.py
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "WARNING: release evidence refresh failed (temporary advisory mode)."
            echo "WARNING: deployment is proceeding while this gate is non-blocking."
            {
              echo "## Advisory Gate Warning"
              echo ""
              echo "- Gate: \`release-evidence-refresh\`"
              echo "- Status: \`failed (advisory)\`"
              echo "- Exit code: \`${EXIT_CODE}\`"
              echo "- Action: rotate/fix Supabase telemetry token scope and re-enable blocking mode."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: vwwandhoydemcybltoxz

  # ─── BUILD & PUSH FRONTEND ───────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test, website-change-gate, preprod-forensic-gate, release-evidence-refresh]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Azure Container Registry
        if: needs.website-change-gate.outputs.deploy_frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend image
        if: needs.website-change-gate.outputs.deploy_frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}
            REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}
            REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
            REACT_APP_RECAPTCHA_SITE_KEY=${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
            REACT_APP_RECAPTCHA_MODE=${{ secrets.REACT_APP_RECAPTCHA_MODE }}
            REACT_APP_RECAPTCHA_PROVIDER=${{ secrets.REACT_APP_RECAPTCHA_PROVIDER }}
            REACT_APP_RECAPTCHA_STRICT=${{ secrets.REACT_APP_RECAPTCHA_STRICT }}

      - name: Record frontend image tag
        if: needs.website-change-gate.outputs.deploy_frontend == 'true'
        run: echo "Frontend image = ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}"

      - name: Frontend build intentionally skipped
        if: needs.website-change-gate.outputs.deploy_frontend != 'true'
        run: |
          echo "Website lock active: protected website paths changed without [website-approved]."
          echo "Skipping frontend image build/push."

  # ─── BUILD & PUSH BACKEND ────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test, preprod-forensic-gate, release-evidence-refresh]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Create Dockerfile.backend
        run: |
          cat > Dockerfile.backend << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends curl && rm -rf /var/lib/apt/lists/*
          COPY backend/requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY backend/ .
          EXPOSE 8001
          HEALTHCHECK --interval=30s --timeout=10s --retries=3 CMD sh -c 'curl -f http://localhost:${WEBSITES_PORT:-${PORT:-8001}}/api/health || exit 1'
          CMD ["sh", "-c", "uvicorn server:app --host 0.0.0.0 --port ${PORT:-${WEBSITES_PORT:-8001}} --workers 1"]
          EOF

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Record backend image tag
        run: echo "Backend image = ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}"

  # ─── DEPLOY TO AZURE ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [website-change-gate, build-frontend, build-backend]

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend to Azure App Service
        if: needs.website-change-gate.outputs.deploy_frontend == 'true'
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITES_PORT=80

      - name: Deploy backend to Azure App Service
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_BACKEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_BACKEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITES_PORT=8001 PORT=8001 \
              RECAPTCHA_PROVIDER=${{ secrets.RECAPTCHA_PROVIDER }} \
              RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }} \
              RECAPTCHA_SITE_KEY=${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }} \
              RECAPTCHA_ENTERPRISE_PROJECT_ID=${{ secrets.RECAPTCHA_ENTERPRISE_PROJECT_ID }} \
              RECAPTCHA_ENTERPRISE_API_KEY=${{ secrets.RECAPTCHA_ENTERPRISE_API_KEY }} \
              RECAPTCHA_MIN_SCORE=${{ secrets.RECAPTCHA_MIN_SCORE }}

      - name: Restart frontend
        if: needs.website-change-gate.outputs.deploy_frontend == 'true'
        run: |
          az webapp restart --name ${{ env.AZURE_WEBAPP_FRONTEND }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Keep existing frontend image (website lock active)
        if: needs.website-change-gate.outputs.deploy_frontend != 'true'
        run: |
          echo "Protected website paths changed without [website-approved] token."
          echo "Skipping frontend build/deploy to prevent unintended website regression."

      - name: Restart backend
        run: |
          az webapp restart --name ${{ env.AZURE_WEBAPP_BACKEND }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Verify frontend image pin
        if: needs.website-change-gate.outputs.deploy_frontend == 'true'
        run: |
          EXPECTED_FRONTEND_IMAGE="DOCKER|${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}"
          for i in $(seq 1 24); do
            LIVE_FRONTEND_IMAGE=$(az webapp config container show \
              --name ${{ env.AZURE_WEBAPP_FRONTEND }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?name=='DOCKER_CUSTOM_IMAGE_NAME'].value | [0]" -o tsv)
            echo "Live frontend image (attempt ${i}): ${LIVE_FRONTEND_IMAGE}"
            if [ "${LIVE_FRONTEND_IMAGE}" = "${EXPECTED_FRONTEND_IMAGE}" ]; then
              echo "Frontend image pin verified."
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "Frontend image pin did not converge to expected tag."
              exit 1
            fi
            echo "Frontend image still converging - retrying in 5s"
            sleep 5
          done

      - name: Verify backend image pin
        run: |
          EXPECTED_BACKEND_IMAGE="DOCKER|${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}"
          for i in $(seq 1 24); do
            LIVE_BACKEND_IMAGE=$(az webapp config container show \
              --name ${{ env.AZURE_WEBAPP_BACKEND }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?name=='DOCKER_CUSTOM_IMAGE_NAME'].value | [0]" -o tsv)
            echo "Live backend image (attempt ${i}): ${LIVE_BACKEND_IMAGE}"
            if [ "${LIVE_BACKEND_IMAGE}" = "${EXPECTED_BACKEND_IMAGE}" ]; then
              echo "Backend image pin verified."
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "Backend image pin did not converge to expected tag."
              exit 1
            fi
            echo "Backend image still converging - retrying in 5s"
            sleep 5
          done

      - name: Smoke test backend health
        run: |
          for i in $(seq 1 18); do
            if curl --fail --silent --show-error ${{ env.BACKEND_HEALTH_URL }} > /tmp/backend_health.json; then
              echo "Backend health check passed on attempt ${i}"
              cat /tmp/backend_health.json
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Backend health check failed after retries"
              exit 1
            fi
            echo "Backend not ready yet (attempt ${i}) — retrying in 10s"
            sleep 10
          done

      - name: Smoke test frontend + API routing
        run: |
          for i in $(seq 1 12); do
            if curl --fail --silent --show-error "${{ env.PRODUCTION_URL }}" > /tmp/frontend_home.html; then
              if grep -qi "BIQc" /tmp/frontend_home.html; then
                echo "Frontend homepage check passed on attempt ${i}"
                break
              fi
            fi
            if [ "$i" -eq 12 ]; then
              echo "Frontend homepage check failed after retries"
              exit 1
            fi
            echo "Frontend homepage not ready yet (attempt ${i}) - retrying in 5s"
            sleep 5
          done

          # First validate direct frontend app host
          for i in $(seq 1 12); do
            DIRECT_CAL_CODE=$(curl --silent --output /tmp/direct_calibration_route.html --write-out "%{http_code}" ${{ env.FRONTEND_APP_URL }}/calibration)
            echo "direct frontend host /calibration HTTP ${DIRECT_CAL_CODE} (attempt ${i})"
            if [ "$DIRECT_CAL_CODE" -eq 200 ]; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected direct frontend host to serve SPA route /calibration"
              cat /tmp/direct_calibration_route.html
              exit 1
            fi
            sleep 5
          done

          for i in $(seq 1 12); do
            DIRECT_API_HEALTH_CODE=$(curl --silent --output /tmp/direct_api_health.json --write-out "%{http_code}" ${{ env.FRONTEND_APP_URL }}/api/health)
            echo "direct frontend host /api/health HTTP ${DIRECT_API_HEALTH_CODE} (attempt ${i})"
            if [ "$DIRECT_API_HEALTH_CODE" -eq 200 ]; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected direct frontend host to proxy /api/health"
              cat /tmp/direct_api_health.json
              exit 1
            fi
            sleep 5
          done

          # Then validate production domain
          for i in $(seq 1 12); do
            CAL_CODE=$(curl --silent --output /tmp/calibration_route.html --write-out "%{http_code}" ${{ env.PRODUCTION_URL }}/calibration)
            echo "calibration route HTTP ${CAL_CODE} (attempt ${i})"
            if [ "$CAL_CODE" -eq 200 ] && grep -qi "<html" /tmp/calibration_route.html; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected production domain to serve /calibration"
              echo "If direct host passed above, this indicates DNS/custom-domain routing drift."
              cat /tmp/calibration_route.html
              exit 1
            fi
            sleep 5
          done

          for i in $(seq 1 12); do
            API_FRONT_CODE=$(curl --silent --output /tmp/frontend_api_health.json --write-out "%{http_code}" ${{ env.PRODUCTION_URL }}/api/health)
            echo "frontend-domain /api/health probe HTTP ${API_FRONT_CODE} (attempt ${i})"
            if [ "$API_FRONT_CODE" -eq 200 ]; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected production domain to proxy /api/health"
              echo "If direct host passed above, this indicates DNS/custom-domain routing drift."
              cat /tmp/frontend_api_health.json
              exit 1
            fi
            sleep 5
          done

          for i in $(seq 1 12); do
            CAL_AUTH_CODE=$(curl --silent --output /tmp/cal_status_probe.json --write-out "%{http_code}" ${{ env.PRODUCTION_URL }}/api/calibration/status)
            echo "frontend-domain /api/calibration/status probe HTTP ${CAL_AUTH_CODE} (attempt ${i})"
            if [ "$CAL_AUTH_CODE" -eq 401 ] || [ "$CAL_AUTH_CODE" -eq 403 ]; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected auth-gated calibration status (401/403) but got ${CAL_AUTH_CODE}"
              cat /tmp/cal_status_probe.json
              exit 1
            fi
            sleep 5
          done

          for i in $(seq 1 12); do
            API_CODE=$(curl --silent --output /tmp/api_probe.json --write-out "%{http_code}" ${{ env.BACKEND_AUTH_PROBE_URL }})
            echo "integration-status probe HTTP ${API_CODE} (attempt ${i})"
            if [ "$API_CODE" -eq 401 ] || [ "$API_CODE" -eq 403 ]; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected auth-gated API response (401/403) but got ${API_CODE}"
              cat /tmp/api_probe.json
              exit 1
            fi
            sleep 5
          done

      - name: Calibration runtime edge smoke
        env:
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE }}
        run: |
          set -euo pipefail

          # Backend calibration APIs must remain reachable and auth-gated.
          CAL_INIT_CODE=$(curl --silent --output /tmp/calibration_init_probe.json --write-out "%{http_code}" \
            -X POST ${{ env.BACKEND_BASE_URL }}/api/calibration/init)
          echo "backend /api/calibration/init HTTP ${CAL_INIT_CODE}"
          if [ "$CAL_INIT_CODE" -ne 401 ] && [ "$CAL_INIT_CODE" -ne 403 ] && [ "$CAL_INIT_CODE" -ne 422 ]; then
            echo "Expected calibration init to be reachable and auth-gated (401/403/422)."
            cat /tmp/calibration_init_probe.json
            exit 1
          fi

          CAL_STATUS_CODE=$(curl --silent --output /tmp/calibration_status_probe.json --write-out "%{http_code}" \
            ${{ env.BACKEND_BASE_URL }}/api/calibration/status)
          echo "backend /api/calibration/status HTTP ${CAL_STATUS_CODE}"
          if [ "$CAL_STATUS_CODE" -ne 401 ] && [ "$CAL_STATUS_CODE" -ne 403 ]; then
            echo "Expected calibration status to be reachable and auth-gated (401/403)."
            cat /tmp/calibration_status_probe.json
            exit 1
          fi

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY for edge smoke tests."
            exit 1
          fi

          EDGE_BASE="${SUPABASE_URL%/}/functions/v1"
          EDGE_FUNCTIONS=(
            calibration-business-dna
            scrape-business-profile
            deep-web-recon
            social-enrichment
            browse-ai-reviews
            semrush-domain-intel
            market-analysis-ai
            market-signal-scorer
            calibration-psych
            calibration-sync
            calibration-engine
            competitor-monitor
          )

          for fn in "${EDGE_FUNCTIONS[@]}"; do
            body_file="/tmp/${fn}-prod-health.json"
            http_code=$(curl --silent --show-error --output "$body_file" --write-out "%{http_code}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              "${EDGE_BASE}/${fn}")

            echo "${fn} health HTTP ${http_code}"
            if [ "$http_code" -ne 200 ]; then
              echo "Expected ${fn} health endpoint to return HTTP 200."
              cat "$body_file"
              exit 1
            fi

            python3 - "$fn" "$body_file" <<'PY'
          import json
          import sys
          from pathlib import Path

          fn = sys.argv[1]
          raw = Path(sys.argv[2]).read_text(encoding="utf-8").strip()
          try:
              payload = json.loads(raw or "{}")
          except Exception:
              print(f"{fn}: health payload is not valid JSON")
              print(raw[:500])
              raise SystemExit(1)

          required = ("ok", "function", "reachable", "generated_at")
          missing = [key for key in required if key not in payload]
          if missing:
              print(f"{fn}: missing health payload keys: {missing}")
              raise SystemExit(1)
          if payload.get("ok") is not True:
              print(f"{fn}: expected ok=true in health payload")
              raise SystemExit(1)
          if payload.get("reachable") is not True:
              print(f"{fn}: expected reachable=true in health payload")
              raise SystemExit(1)
          reported_name = str(payload.get("function") or "")
          if reported_name not in {fn, fn.replace("-", "_")}:
              print(f"{fn}: function mismatch in health payload: {reported_name}")
              raise SystemExit(1)
          PY
          done

      - name: Verify frontend custom-domain binding
        run: |
          for i in $(seq 1 12); do
            HOSTNAMES=$(az webapp config hostname list \
              --webapp-name ${{ env.AZURE_WEBAPP_FRONTEND }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[].name" -o tsv)
            echo "Frontend hostnames (attempt ${i}):"
            echo "$HOSTNAMES"
            if echo "$HOSTNAMES" | grep -q "^biqc.ai$"; then
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Expected custom domain biqc.ai to remain bound to frontend app."
              exit 1
            fi
            sleep 5
          done

      # ── PERMANENT FIX: Enforce Supabase site_url after every deploy ──────
      - name: Lock Supabase site_url to production
        run: |
          curl -s -X PATCH "https://api.supabase.com/v1/projects/vwwandhoydemcybltoxz/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"site_url":"https://biqc.ai","additional_redirect_urls":"https://biqc.ai/**,https://biqc.ai/auth/callback"}' \
            | grep -o '"site_url":"[^"]*"' | head -1
          echo "Supabase site_url locked to production ✓"

      - name: Publish deployment summary
        run: |
          {
            echo "## Deployment Verification"
            echo ""
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Commit SHA:** \`${{ github.sha }}\`"
            echo "- **Frontend image target:** \`${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}\`"
            echo "- **Frontend deployed this run:** \`${{ needs.website-change-gate.outputs.deploy_frontend }}\`"
            echo "- **Protected website changed:** \`${{ needs.website-change-gate.outputs.website_changed }}\`"
            echo "- **Website approval token present:** \`${{ needs.website-change-gate.outputs.website_approved }}\`"
            echo "- **Backend image:** \`${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}\`"
            echo "- **Frontend URL:** https://biqc.ai"
            echo "- **Backend URL:** ${{ env.BACKEND_BASE_URL }}"
            echo "- **Run URL:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- **Zero regression playbook:** \`docs/operations/ZERO_REGRESSION_RELEASE_PLAYBOOK.md\`"
            echo ""
            echo "All verification and smoke-test steps above must pass for this summary to appear."
          } >> "$GITHUB_STEP_SUMMARY"
