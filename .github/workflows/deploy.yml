name: Build & Deploy BIQc

on:
  push:
    branches: [main]

env:
  REGISTRY: biqcregistry.azurecr.io
  FRONTEND_IMAGE: biqcregistry.azurecr.io/biqc-frontend
  BACKEND_IMAGE: biqcregistry.azurecr.io/biqc-api
  AZURE_WEBAPP_FRONTEND: biqc-web
  AZURE_WEBAPP_BACKEND: biqc-api
  AZURE_RESOURCE_GROUP: biqc-production

jobs:
  # ─── BUILD & PUSH FRONTEND ───────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}
            REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}
            REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}

  # ─── BUILD & PUSH BACKEND ────────────────────────────────────────────────
  # NOTE: Backend auto-deploy DISABLED — deploy backend manually only.
  # Uncomment this job when backend changes are tested and ready.
  # build-backend:
  #   name: Build Backend
  #   ... (disabled to prevent accidental backend breakage)

  # ─── DEPLOY TO AZURE ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend to Azure App Service
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.FRONTEND_IMAGE }}:${{ needs.build-frontend.outputs.image-tag }} \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      # Backend deploy intentionally omitted — backend deployed manually only

      - name: Restart frontend
        run: |
          az webapp restart --name ${{ env.AZURE_WEBAPP_FRONTEND }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

      # ── PERMANENT FIX: Enforce Supabase site_url after every deploy ──────
      # This prevents the beta.thestrategysquad.com redirect loop from ever
      # recurring due to a deployment resetting the Supabase config.
      - name: Lock Supabase site_url to production
        run: |
          curl -s -X PATCH "https://api.supabase.com/v1/projects/vwwandhoydemcybltoxz/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"site_url":"https://biqc.thestrategysquad.com","additional_redirect_urls":"https://biqc.thestrategysquad.com/**,https://biqc.thestrategysquad.com/auth/callback"}' \
            | grep -o '"site_url":"[^"]*"' | head -1
          echo "Supabase site_url locked to production ✓"
