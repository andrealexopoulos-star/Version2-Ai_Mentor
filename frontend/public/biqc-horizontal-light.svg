<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qGlass" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="40%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="qSheen" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="slashGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#8D2B00"/>
    </linearGradient>
    <linearGradient id="slashSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="topHalf">
      <rect x="0" y="0" width="1400" height="200" fill="white"/>
    </mask>
  </defs>

  <g transform="translate(200 200)">
    <g filter="url(#lift)">
      <circle cx="0" cy="0" r="105" fill="none" stroke="url(#qGlass)" stroke-width="50"/>
    </g>
    <g mask="url(#topHalf)" transform="translate(-200 -200)">
      <circle cx="200" cy="200" r="105" fill="none" stroke="url(#qSheen)" stroke-width="50"/>
    </g>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.45"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#000000" stroke-width="0.6" stroke-opacity="0.10"/>

    <g transform="rotate(40)">
      <g filter="url(#lift)">
        <rect x="-25" y="36" width="50" height="178" fill="url(#slashGlass)"/>
      </g>
      <rect x="-25" y="36" width="50" height="178" fill="url(#slashSheen)"/>
      <rect x="-25" y="36" width="50" height="1" fill="#FFE0B2" opacity="0.65"/>
      <rect x="24.3" y="36" width="0.7" height="178" fill="#000000" opacity="0.18"/>
    </g>
  </g>

  <g transform="translate(450 230)">
    <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="160" font-weight="400" letter-spacing="6">
      <tspan fill="#0A0A0A">B</tspan><tspan fill="#0A0A0A">I</tspan><tspan fill="#E65100" font-weight="600">Q</tspan><tspan fill="#0A0A0A">c.ai</tspan>
    </text>
  </g>
</svg>
