    <!-- Inline theme boot — runs before React mounts to prevent a flash of the
         wrong theme. Reads the persisted value set by ThemeContext; falls back
         to prefers-color-scheme; defaults to light. -->
    <script>
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem('biqc_theme'); } catch (e) {}
          var theme = stored;
          if (theme !== 'light' && theme !== 'dark') {
            var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            theme = prefersLight ? 'light' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          // Keep the browser chrome in sync with the active theme.
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'light' ? '#FFFFFF' : '#0F1720');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!-- Google tag (gtag.js) — GA4 + Google Ads conversion tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HRW99KL3BF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = window.gtag || gtag;
      gtag('js', new Date());

      // Google Ads conversion tag — always active for conversion measurement
      gtag('config', 'AW-18002554945');

      // Enable GA4 config — called on consent or if previously accepted
      window.__biqc_enable_analytics = function() {
        if (!window.__biqc_analytics_enabled) {
          gtag('config', 'G-HRW99KL3BF');
          window.__biqc_analytics_enabled = true;
        }
      };

      // Auto-init if user already gave consent in a previous session
      try {
        if (localStorage.getItem('biqc_cookie_consent') === 'accepted') {
          window.__biqc_enable_analytics();
        }
      } catch(e) {}
    </script>
    <!-- Google tag (gtag.js) event - delayed navigation helper -->
    <script>
      function gtagSendEvent(url) {
        var callback = function () {
          if (typeof url === 'string') {
            window.location = url;
          }
        };
        gtag('event', 'ads_conversion_Subscribe_1', {
          'event_callback': callback,
          'event_timeout': 2000,
        });
        return false;
      }
    </script>

        <!-- Stripe.js — loaded from CDN per Stripe's fraud-scoring best
             practice. Global window.Stripe is then used via a small React
             hook (useStripeJs) rather than the @stripe/react-stripe-js npm
             wrapper. Publishable key is injected at build time from the
             REACT_APP_STRIPE_PUBLISHABLE_KEY env var. -->
        <script src="https://js.stripe.com/v3/"></script>

        <!-- Sentry Loader Script — async error + performance monitoring.
             DSN-in-URL is public by Sentry's design (like a Stripe
             publishable key). Lazy-loads the SDK; our custom
             `Sentry.onLoad` in src/lib/sentry.js wires init config +
             integrates with AppErrorBoundary.
             Added 2026-04-19 post P1 incident (PR #335) — so we see
             every user-facing crash within minutes, not after the CEO
             reports it. -->
        <script
          src="https://js.sentry-cdn.com/58a5d042cef4f47cfdbf0a7d15f5b1e0.min.js"
          crossorigin="anonymous"
        ></script>
        <script>
          // Configure Sentry before the React bundle initializes it. The
          // loader exposes `Sentry.onLoad()` which fires once the SDK
          // is ready; our src/lib/sentry.js calls Sentry.init() with the
          // full config at that moment.
          window.sentryOnLoad = function () {
            // no-op here — React-side sentry.js handles init. This
            // handler is referenced by the loader script but we keep the
            // real work in code so it can be version-controlled.
          };
        </script>
