server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Phase 6 — HTML must NOT be cached, so every deploy's new
    # main.<hash>.js reference is picked up immediately. Hashed JS/CSS
    # (handled below) still get immutable long-cache. Without this,
    # browsers kept stale index.html after the 2026-04-19 P1 deploy
    # even though the fix was live on origin (9.5hr outage exposure
    # window was amplified by client-side HTML caching).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Service worker (if any future PWA rev): never cache.
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # asset-manifest.json maps route chunks — must always be fresh so
    # new code-split bundles deploy without clients missing them.
    location = /asset-manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # PWA manifest — 1-day cache: updates infrequently but shouldn't be
    # immutable in case we change icons or name.
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # React SPA — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

# API proxy to backend
    location /api/ {
        # Changed from http://backend:8001/api/ to the public Azure URL
        proxy_pass https://biqc-api.azurewebsites.net/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # This tells the backend what the original request looked like
        proxy_set_header Host biqc-api.azurewebsites.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
